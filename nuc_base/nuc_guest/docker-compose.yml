configs:
  vss_overlay.json:
    file: "./spec/vss.json"

services:
  kuksa-serial-bridge:
    build:
      context: ./kuksa-serial-bridge
    container_name: kuksa-serial-bridge
    #network_mode: "host"
    devices:
      - "/dev/arduino_active:/dev/arduino_active"
      - "/dev/arduino_passive:/dev/arduino_passive"
    volumes:
      - ./kuksa-serial-bridge:/app
    working_dir: /app
    command: python3 bridge.py
    environment:
      - PYTHONUNBUFFERED=1
