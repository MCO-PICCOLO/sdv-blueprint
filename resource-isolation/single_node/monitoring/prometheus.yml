global:
  scrape_interval: 100ms      # finer sampling for ON/OFF tick visualization
  evaluation_interval: 100ms

scrape_configs:
  - job_name: 'led-timpani'
    static_configs:
      - targets: ['localhost:9101']  # single-node: metrics exposed on localhost
        labels:
          container: 'timpani'
          type: 'realtime'

  - job_name: 'led-normal'
    static_configs:
      - targets: ['localhost:9102']  # single-node: metrics exposed on localhost
        labels:
          container: 'normal'
          type: 'standard'
