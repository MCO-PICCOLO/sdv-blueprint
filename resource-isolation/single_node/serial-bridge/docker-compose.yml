configs:
  vss_overlay.json:
    file: "./spec/vss.json"

services:
  resiso-serial-bridge:
    build:
      context: ./serial
    image: serial-bridge:latest
    container_name: resiso-serial-bridge
    devices:
      - "/dev/arduino_joystick:/dev/arduino_joystick"
      - "/dev/arduino_led:/dev/arduino_led"
      - "/dev/arduino_gear:/dev/arduino_gear"
    volumes:
      - ./serial:/app
      - ./pullpiri-yaml:/yaml
    working_dir: /app
    command: python3 bridge.py
    environment:
      PYTHONUNBUFFERED: "1"
      # Single-node: pullpiri apiserver binds to the host's LAN IP (NODE_IP), not the
      # docker host-gateway. The orchestrator passes MASTER_IP=NODE_IP so the bridge
      # reaches the apiserver on the same address it listens on. Falls back to the
      # docker host gateway when MASTER_IP is not provided.
      MASTER_IP: "${MASTER_IP:-host.docker.internal}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - resiso-databroker

  resiso-databroker:
    image: "quay.io/eclipse-kuksa/kuksa-databroker:0.6.0"
    container_name: "resiso-databroker"
    ports:
      - "55556:55555"
    configs:
      - "vss_overlay.json"
    environment:
      KUKSA_DATABROKER_ADDR: "0.0.0.0"
      KUKSA_DATABROKER_PORT: "55555"
      KUKSA_DATABROKER_METADATA_FILE: "/vss_overlay.json"
      RUST_LOG: "info"
    # for the time being, we do not use TLS secured connections to Databroker
    command: "--insecure"
