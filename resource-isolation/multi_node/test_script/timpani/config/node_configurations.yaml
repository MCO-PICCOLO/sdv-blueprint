# TTRT Global Scheduler - Node Configuration File
# Defines hardware specs and available resources for each node

nodes:
  master:
    # Master node
    available_cpus: [12, 13, 14, 15]
    max_memory_mb: 31000
    architecture: "x86_64"
    location: "local_master_pc"
    description: "Master node"
  guest:
    # Guest node
    available_cpus: [12, 13, 14, 15]
    max_memory_mb: 31114
    architecture: "x86_64"
    location: "guest_node"
    description: "Guest node"